[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "eaa-imaging"
version = "1.0.0"
description = "Imaging and microscopy task managers, tools, and adapters for EAA."
requires-python = ">=3.11"
dependencies = [
    "eaa-core>=1.0.0,<2.0.0",
    "numpy",
    "pillow",
    "requests",
    "scikit-image",
    "scipy",
    "tifffile",
]

[project.optional-dependencies]
bo = [
    "eaa-core[bo]>=1.0.0,<2.0.0",
]
dev = [
    "pytest",
    "ruff",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["eaa_imaging*"]
namespaces = true

[tool.setuptools.package-data]
"eaa_imaging" = [
    "assets/context_learning_examples/*",
    "private_skills/*/SKILL.md",
    "private_skills/*/images/*",
    "skills/*/SKILL.md",
    "skills/*/images/*",
    "skills/*/references/*.md",
    "task_manager/prompts/*.md",
]
