[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "eaa-core"
version = "0.1.0"
description = "Core runtime, shared tooling, and generic task managers for EAA."
requires-python = ">=3.11"
dependencies = [
    "langgraph",
    "langchain-core",
    "langchain-openai",
    "fastapi",
    "matplotlib",
    "numpy",
    "openai",
    "pillow",
    "tqdm",
    "fastmcp>=2.11.3",
    "langgraph-checkpoint-sqlite>=3.0.3",
    "uvicorn[standard]",
]

[project.optional-dependencies]
asksage = [
    "asksageclient==1.31",
]
bo = [
    "botorch",
]
docs = [
    "mkdocs-material",
]
memory_chroma = [
    "chromadb",
    "langchain-chroma>=1.1.0",
]
dev = [
    "pytest",
    "ruff",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["eaa_core*"]
namespaces = true

[tool.setuptools.package-data]
"eaa_core" = [
    "gui/static/mathjax/LICENSE",
    "gui/static/mathjax/es5/tex-svg-full.js",
    "gui/static/webui/index.html",
    "gui/static/webui/assets/*.css",
    "gui/static/webui/assets/*.js",
    "skills/*/SKILL.md",
    "skills/*/examples/*.py",
    "skills/*/references/*.md",
    "task_manager/prompts/*.md",
]
